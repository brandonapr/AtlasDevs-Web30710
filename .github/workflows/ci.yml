name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  web-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build:web --if-present
